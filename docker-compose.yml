services:
  mysql:
    image: mysql:8.4
    container_name: cinebook-mysql
    environment:
      MYSQL_DATABASE: bms_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - cinebook-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: cinebook-backend
    ports:
      - "8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/bms_db?createDatabaseIfNotExist=true
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  cinebook-mysql-data: